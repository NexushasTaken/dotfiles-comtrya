# yaml-language-server: $schema=https://github.com/NexushasTaken/comtrya/raw/refs/heads/personal/jsonschemagen/schema.json

actions:
  - action: file.link
    from: btop/
    to: "{{ user.config_dir }}/btop"
    before:
      - action: package.install
        name: btop

  - action: file.link
    from: bat/
    to: "{{ user.config_dir }}/bat"
    before:
      - action: package.install
        name: bat

  - action: file.link
    from: clangd/
    to: "{{ user.config_dir }}/clangd"
    # before:
    #   - action: package.install
    #     name: clang

  - action: file.link
    from: superfile/
    to: "{{ user.config_dir }}/superfile"
    before:
      - action: package.install
        name: superfile

  - action: file.link
    from: ranger/
    to: "{{ user.config_dir }}/ranger"
    before:
      - action: package.install
        name: ranger

  - action: file.link
    from: mpv/
    to: "{{ user.config_dir }}/mpv"
    before:
      - action: package.install
        name: mpv
