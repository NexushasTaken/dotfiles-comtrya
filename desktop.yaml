# yaml-language-server: $schema=https://github.com/NexushasTaken/comtrya/raw/refs/heads/personal/jsonschemagen/schema.json

depends:
  - kanata
  - hyprland
  - dev-utils

actions:
  - action: file.link
    from: alacritty/
    to: "{{ user.config_dir }}/alacritty"
    before:
      - action: package.install
        name: alacritty
        provider: pacman

  - action: file.link
    from: foot/
    to: "{{ user.config_dir }}/foot"
    before:
      - action: package.install
        name: foot
