# yaml-language-server: $schema=https://github.com/NexushasTaken/comtrya/raw/refs/heads/personal/jsonschemagen/schema.json

actions:
  - action: file.link
    from: lazygit/
    to: "{{ user.config_dir }}/lazygit"
    before:
      - action: package.install
        name: lazygit

  - action: file.link
    from: gdb/
    to: "{{ user.config_dir }}/gdb"
    before:
      - action: package.install
        name: gdb
        provider: pacman

  - action: file.link
    from: tmux/
    to: "{{ user.config_dir }}/tmux"
    before:
      - action: package.install
        name: tmux
        provider: pacman

  - action: file.link
    from: .inputrc
    to: "{{ user.home_dir }}/.inputrc"

  - action: file.link
    from: git/
    to: "{{ user.config_dir }}/git"
    before:
      - action: package.install
        name: git
        provider: pacman

  - action: file.link
    from: gh/config.yml
    to: "{{ user.config_dir }}/gh/config.yml"
    before:
      - action: package.install
        name: github-cli
        provider: pacman

  - action: file.link
    from: fish/
    to: "{{ user.config_dir }}/fish"
    before:
      - action: package.install
        name: fish
        provider: pacman

  - action: file.link
    from: alacritty/
    to: "{{ user.config_dir }}/alacritty"
    before:
      - action: package.install
        name: alacritty
        provider: pacman

  - action: file.link
    from: foot/
    to: "{{ user.config_dir }}/foot"
    before:
      - action: package.install
        name: foot
